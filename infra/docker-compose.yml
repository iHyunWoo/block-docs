name: block-docs

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: blockdocs
      POSTGRES_PASSWORD: blockdocs
      POSTGRES_DB: blockdocs
    ports:
      - "5442:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blockdocs"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6390:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://blockdocs:blockdocs@postgres:5432/blockdocs
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  ws-1:
    build:
      context: ../apps/ws
      dockerfile: Dockerfile
    environment:
      INSTANCE_ID: ws-1
      PORT: 4000
      REDIS_URL: redis://redis:6379/0
      API_URL: http://api:8000
    ports:
      - "4001:4000"
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started

  ws-2:
    build:
      context: ../apps/ws
      dockerfile: Dockerfile
    environment:
      INSTANCE_ID: ws-2
      PORT: 4000
      REDIS_URL: redis://redis:6379/0
      API_URL: http://api:8000
    ports:
      - "4002:4000"
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started

  web-1:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    environment:
      INSTANCE_ID: web-1
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:4001
      NEXT_PUBLIC_INSTANCE_LABEL: web-1 / ws-1
    ports:
      - "3001:3000"
    depends_on:
      - api

  web-2:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    environment:
      INSTANCE_ID: web-2
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:4002
      NEXT_PUBLIC_INSTANCE_LABEL: web-2 / ws-2
    ports:
      - "3002:3000"
    depends_on:
      - api

volumes:
  postgres-data:
  redis-data:
